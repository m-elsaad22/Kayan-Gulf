name: KAYAN — Full CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: me-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.me-south-1.amazonaws.com
  API_IMAGE: kayan-api
  ADMIN_IMAGE: kayan-admin

# ============================================================
# SHARED: Test Backend
# ============================================================
jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kayan_test
          POSTGRES_PASSWORD: kayan_test
          POSTGRES_DB: kayan_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run DB migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://kayan_test:kayan_test@localhost:5432/kayan_test
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://kayan_test:kayan_test@localhost:5432/kayan_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: test_secret_64_chars_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          JWT_REFRESH_SECRET: test_refresh_64_chars_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          OTP_SIMULATE: 'true'
        run: npm run test:cov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage

  # ============================================================
  # LINT + TYPE CHECK
  # ============================================================
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Backend lint
        working-directory: backend
        run: npm ci && npm run lint

      - name: Backend type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Admin lint
        working-directory: admin
        run: npm ci && npm run lint

      - name: Admin type check
        working-directory: admin
        run: npm run type-check

  # ============================================================
  # BUILD: Backend Docker
  # ============================================================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: lint-typecheck
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        id: build
        uses: docker/build-push-action@v5
        with:
          context: backend
          target: production
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.API_IMAGE }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            git.sha=${{ github.sha }}
            git.branch=${{ github.ref_name }}
            built.at=${{ github.event.head_commit.timestamp }}

  # ============================================================
  # BUILD: Admin Next.js
  # ============================================================
  build-admin:
    name: Build Admin Dashboard
    runs-on: ubuntu-latest
    needs: lint-typecheck
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Build admin
        working-directory: admin
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_TELEMETRY_DISABLED: 1
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy admin to S3 + CloudFront
        if: github.ref == 'refs/heads/main'
        run: |
          aws s3 sync admin/out/ s3://kayan-admin-static/ --delete
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_ADMIN_ID }} \
            --paths "/*"

  # ============================================================
  # DEPLOY: Run Migrations
  # ============================================================
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Prisma migrations via ECS
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster kayan-cluster \
            --task-definition kayan-api \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=['${{ secrets.PRIVATE_SUBNET_1 }}','${{ secrets.PRIVATE_SUBNET_2 }}'],
              securityGroups=['${{ secrets.ECS_SG }}'],
              assignPublicIp=DISABLED
            }" \
            --overrides '{"containerOverrides":[{"name":"kayan-api","command":["npx","prisma","migrate","deploy"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"

          # Wait for completion
          aws ecs wait tasks-stopped \
            --cluster kayan-cluster \
            --tasks "$TASK_ARN"

          # Check exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster kayan-cluster \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ Migration failed with exit code: $EXIT_CODE"
            exit 1
          fi
          echo "✅ Migrations completed successfully"

  # ============================================================
  # DEPLOY: Update ECS Service
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [migrate]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS service with new image
        run: |
          # Get current task definition
          CURRENT_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition kayan-api \
            --query 'taskDefinition' \
            --output json)

          # Update image in task definition
          NEW_TASK_DEF=$(echo $CURRENT_TASK_DEF | jq \
            --arg IMAGE "${{ env.ECR_REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}" \
            '.containerDefinitions[0].image = $IMAGE')

          # Register new task definition
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "New task definition: $NEW_TASK_DEF_ARN"

          # Update service (rolling deployment)
          aws ecs update-service \
            --cluster kayan-cluster \
            --service kayan-api \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --deployment-configuration "maximumPercent=200,minimumHealthyPercent=100"

      - name: Wait for deployment
        run: |
          echo "⏳ Waiting for deployment to stabilize..."
          aws ecs wait services-stable \
            --cluster kayan-cluster \
            --services kayan-api \
            --region ${{ env.AWS_REGION }}
          echo "✅ Deployment stable!"

      - name: Smoke test production
        run: |
          sleep 10
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://api.kayan.sa/api/v1/health/liveness)
          if [ "$HEALTH" != "200" ]; then
            echo "❌ Health check failed: HTTP $HEALTH"
            exit 1
          fi
          echo "✅ Production health check passed!"

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 KAYAN deployed to production!"
          echo "SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "🔄 Rolling back to previous deployment..."
          aws ecs update-service \
            --cluster kayan-cluster \
            --service kayan-api \
            --task-definition kayan-api  # Use previous stable version
          echo "Rollback initiated."

  # ============================================================
  # DEPLOY: Staging (develop branch)
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_STAGING_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_STAGING_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to staging ECS
        run: |
          aws ecs update-service \
            --cluster kayan-staging-cluster \
            --service kayan-api-staging \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster kayan-staging-cluster \
            --services kayan-api-staging

          echo "✅ Staging deployment complete!"
