plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def hasReleaseSigning = localProperties.getProperty("storeFile") &&
        localProperties.getProperty("storePassword") &&
        localProperties.getProperty("keyAlias") &&
        localProperties.getProperty("keyPassword")

android {
    namespace "sa.kayan.app"
    compileSdk 35
    ndkVersion "26.3.11579264"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }
    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "sa.kayan.app"
        minSdk 23
        targetSdk 35
        versionCode localProperties.getProperty("flutter.versionCode")?.toInteger() ?: 1
        versionName localProperties.getProperty("flutter.versionName") ?: "1.0.0"
        multiDexEnabled true
        manifestPlaceholders = [
            MAPS_API_KEY: localProperties.getProperty("MAPS_API_KEY") ?: ""
        ]
    }

    // ── Signing Config ────────────────────────────────────────
    // للنشر على Google Play اتبع الخطوات التالية:
    //   1. أنشئ keystore:
    //      keytool -genkey -v -keystore kayan-release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias kayan
    //   2. أضف في local.properties (لا ترفعه لـ Git):
    //      storeFile=../kayan-release.jks
    //      storePassword=YOUR_STORE_PASSWORD
    //      keyAlias=kayan
    //      keyPassword=YOUR_KEY_PASSWORD
    //   3. The release build automatically uses these values when present.
    //
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile     file(localProperties.getProperty("storeFile"))
                storePassword localProperties.getProperty("storePassword")
                keyAlias      localProperties.getProperty("keyAlias")
                keyPassword   localProperties.getProperty("keyPassword")
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig = hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
        }
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
    }

    packagingOptions {
        exclude "META-INF/DEPENDENCIES"
        exclude "META-INF/LICENSE"
        exclude "META-INF/LICENSE.txt"
        exclude "META-INF/NOTICE"
        exclude "META-INF/NOTICE.txt"
    }

    lint {
        disable "InvalidPackage"
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
    implementation "androidx.multidex:multidex:2.0.1"
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"
}

configurations.all {
    resolutionStrategy {
        force "androidx.core:core:1.15.0"
        force "androidx.core:core-ktx:1.15.0"
        force "androidx.activity:activity:1.9.3"
        force "androidx.activity:activity-ktx:1.9.3"
        force "androidx.browser:browser:1.8.0"
    }
}
