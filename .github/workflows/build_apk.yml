name: Build Release APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Attach APK to a GitHub Release"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure Android Gradle wrapper exists
        run: |
          if [ ! -x android/gradlew ]; then
            gradle wrapper --gradle-version 8.10 --distribution-type bin --project-dir android
          fi

      - name: Build release APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kayan-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Create GitHub Release (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.create_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: KAYAN v1.0.0
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          draft: false
          prerelease: false
