name: Build Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: Build Android release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.0"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure Android Gradle wrapper exists
        run: |
          if [ ! -x android/gradlew ]; then
            gradle wrapper --gradle-version 8.14.0 --distribution-type bin --project-dir android
          fi

      - name: Build release APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: kayan-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
